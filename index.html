<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoL Mastery Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:      #c89b3c;
      --gold-light:#f0d875;
      --gold-dim:  #7a5c1e;
      --obsidian:  #0a0a0f;
      --dark:      #0d0d14;
      --panel:     #13131e;
      --panel2:    #1a1a28;
      --border:    #2a2a3e;
      --text:      #ccc5b0;
      --text-dim:  #6b6555;
      --blue:      #4fc3f7;
      --red:       #ef5350;
      --green:     #66bb6a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--obsidian);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 16px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 48px 24px 32px;
      border-bottom: 1px solid var(--border);
      position: relative;
      background: linear-gradient(180deg, #0f0f1a 0%, transparent 100%);
    }
    header::after {
      content: '';
      position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
      width: 200px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .logo-line {
      display: flex; align-items: center; justify-content: center; gap: 16px;
      margin-bottom: 8px;
    }
    .logo-diamond {
      width: 10px; height: 10px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }
    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 900;
      color: var(--gold-light);
      letter-spacing: 0.12em;
      text-shadow: 0 0 40px rgba(200,155,60,0.4);
    }
    .subtitle {
      font-size: 0.95rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 300;
    }

    /* ── Search form ── */
    .search-wrap {
      max-width: 680px;
      margin: 36px auto 0;
      padding: 0 20px;
    }
    .search-grid {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 8px;
      align-items: end;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--gold-dim);
      text-transform: uppercase;
    }
    input, select {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      border-radius: 2px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      width: 100%;
    }
    input::placeholder { color: var(--text-dim); }
    input:focus, select:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 2px rgba(200,155,60,.12);
    }
    select option { background: var(--panel2); }

    .btn-search {
      background: linear-gradient(135deg, #b8860b, #c89b3c);
      color: #0a0a0f;
      border: none;
      padding: 10px 22px;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      white-space: nowrap;
      height: 42px;
      transition: filter .2s, transform .1s;
    }
    .btn-search:hover { filter: brightness(1.15); }
    .btn-search:active { transform: scale(.97); }
    .btn-search:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Filters bar ── */
    #filters {
      max-width: 1200px;
      margin: 28px auto 0;
      padding: 0 20px;
      display: none;
    }
    .filters-inner {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 14px 18px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }
    .filter-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--gold-dim);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 5px 12px;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      border-radius: 2px;
      transition: all .2s;
    }
    .filter-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
    .filter-btn.active {
      background: rgba(200,155,60,.15);
      border-color: var(--gold);
      color: var(--gold-light);
    }
    .divider-v { width: 1px; height: 24px; background: var(--border); }
    .sort-select {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 10px;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      border-radius: 2px;
    }
    .stats-text {
      margin-left: auto;
      font-size: 0.85rem;
      color: var(--text-dim);
    }
    .stats-text strong { color: var(--gold); }

    /* ── Grid ── */
    #grid {
      max-width: 1200px;
      margin: 20px auto 60px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 4px;
    }

    /* ── Champion card ── */
    .champ-card {
      position: relative;
      cursor: default;
      border-radius: 2px;
      overflow: hidden;
      aspect-ratio: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      transition: transform .2s, border-color .2s;
    }
    .champ-card:hover {
      transform: translateY(-3px) scale(1.04);
      border-color: var(--gold-dim);
      z-index: 2;
    }
    .champ-card.unplayed { opacity: .35; filter: grayscale(.8); }
    .champ-card.low-pts { opacity: .55; }

    .champ-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .champ-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(0deg, rgba(0,0,0,.85) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 5px 6px;
      opacity: 0;
      transition: opacity .2s;
    }
    .champ-card:hover .champ-overlay { opacity: 1; }

    .champ-name {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.06em;
    }
    .champ-pts {
      font-size: 0.75rem;
      color: var(--gold-light);
      font-weight: 600;
    }

    /* Mastery level badge */
    .badge {
      position: absolute;
      top: 4px; right: 4px;
      width: 20px; height: 20px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      font-weight: 900;
      color: #fff;
      border: 1.5px solid rgba(255,255,255,.3);
      backdrop-filter: blur(2px);
    }
    .badge[data-level="10"] { background: rgba(200,155,60,.85); border-color: var(--gold-light); }
    .badge[data-level="9"]  { background: rgba(200,155,60,.7); }
    .badge[data-level="8"]  { background: rgba(120,100,200,.75); }
    .badge[data-level="7"]  { background: rgba(80,160,200,.7); }
    .badge[data-level="6"]  { background: rgba(60,120,80,.7); }
    .badge[data-level="5"]  { background: rgba(100,80,50,.7); }

    /* Points bar */
    .pts-bar-wrap {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,.08);
    }
    .pts-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      transition: width .4s ease;
    }

    /* ── State messages ── */
    #status {
      text-align: center;
      padding: 80px 20px;
      font-size: 1rem;
      color: var(--text-dim);
      display: none;
    }
    .status-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
      display: block;
    }
    #error-msg {
      max-width: 500px;
      margin: 24px auto 0;
      padding: 14px 18px;
      background: rgba(239,83,80,.08);
      border: 1px solid rgba(239,83,80,.3);
      color: #ef9a9a;
      font-size: 0.9rem;
      text-align: center;
      display: none;
      border-radius: 2px;
    }

    /* ── Spinner ── */
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .search-grid { grid-template-columns: 1fr 1fr; }
      .btn-search { grid-column: 1 / -1; width: 100%; }
      #grid { grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); }
    }

    /* ── Fade-in animation for cards ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .champ-card { animation: fadeUp .3s ease both; }
  </style>
</head>
<body>

<header>
  <div class="logo-line">
    <span class="logo-diamond"></span>
    <h1>MASTERY FORGE</h1>
    <span class="logo-diamond"></span>
  </div>
  <p class="subtitle">League of Legends — Champion Mastery Tracker</p>

  <div class="search-wrap">
    <div class="search-grid">
      <div class="field" style="grid-column:1/-1">
        <label>Riot ID</label>
        <input type="text" id="inp-gamename" placeholder="GameName#TAG" />
      </div>
      <div class="field" style="grid-column:1/3">
        <label>Région</label>
        <select id="inp-region">
          <option value="euw1">EUW</option>
          <option value="eun1">EUNE</option>
          <option value="na1">NA</option>
          <option value="kr">KR</option>
          <option value="br1">BR</option>
          <option value="la1">LAN</option>
          <option value="la2">LAS</option>
          <option value="jp1">JP</option>
          <option value="tr1">TR</option>
          <option value="ru">RU</option>
          <option value="oc1">OCE</option>
        </select>
      </div>
      <div class="field" style="grid-column:3/5; align-self:end;">
        <button class="btn-search" id="btn-search" onclick="doSearch()">Rechercher</button>
      </div>
    </div>
  </div>
</header>

<div id="error-msg"></div>

<div id="filters">
  <div class="filters-inner">
    <span class="filter-label">Afficher&nbsp;:</span>
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Tous</button>
    <button class="filter-btn" data-filter="played" onclick="setFilter('played', this)">Joués</button>
    <button class="filter-btn" data-filter="unplayed" onclick="setFilter('unplayed', this)">Non joués</button>
    <button class="filter-btn" data-filter="low" onclick="setFilter('low', this)">
      &lt; 5 000 pts
    </button>

    <span class="divider-v"></span>

    <span class="filter-label">Trier&nbsp;:</span>
    <select class="sort-select" id="sort-select" onchange="applySort()">
      <option value="pts-desc">Points ↓</option>
      <option value="pts-asc">Points ↑</option>
      <option value="name-asc">Nom A→Z</option>
      <option value="name-desc">Nom Z→A</option>
      <option value="level-desc">Niveau ↓</option>
    </select>

    <span class="stats-text" id="stats-text"></span>
  </div>
</div>

<div id="status"><span class="status-icon">⚔️</span>Entrez un Riot ID pour commencer.</div>
<div id="grid"></div>

<script>
// ── DDragon helpers ──────────────────────────────────────────────────────────
const DD_BASE = "https://ddragon.leagueoflegends.com";

async function getDDragonVersion() {
  const r = await fetch(`${DD_BASE}/api/versions.json`);
  const v = await r.json();
  return v[0]; // latest
}

async function getAllChampions(version) {
  const r = await fetch(`${DD_BASE}/cdn/${version}/data/en_US/champion.json`);
  const d = await r.json();
  // Returns { name: { key (numeric id), id (string), name, ... } }
  return d.data;
}

// Build map: championId (number) → { name, image }
function buildChampMap(champData, version) {
  const map = {};
  for (const [, champ] of Object.entries(champData)) {
    map[parseInt(champ.key)] = {
      name: champ.name,
      img: `${DD_BASE}/cdn/${version}/img/champion/${champ.id}.png`,
      id: champ.id,
    };
  }
  return map;
}

// ── State ────────────────────────────────────────────────────────────────────
let champMap = {};
let allData  = []; // { id, name, img, points, level }
let currentFilter = 'all';
let currentSort   = 'pts-desc';
let maxPts = 1;

// ── Search ───────────────────────────────────────────────────────────────────
async function doSearch() {
  const raw    = document.getElementById('inp-gamename').value.trim();
  const region = document.getElementById('inp-region').value;

  hideError();
  clearGrid();

  if (!raw) { showError("Entrez un Riot ID (ex: Faker#KR1)"); return; }

  const parts = raw.split('#');
  if (parts.length < 2 || !parts[1]) { showError("Format invalide. Utilisez GameName#TAG"); return; }

  const [gameName, tagLine] = parts;

  showLoading();
  const btn = document.getElementById('btn-search');
  btn.disabled = true;

  try {
    // Load DDragon + Riot in parallel
    const versionP  = getDDragonVersion();
    const masteryP  = fetch(`/api/mastery?gameName=${encodeURIComponent(gameName)}&tagLine=${encodeURIComponent(tagLine)}&region=${region}`)
      .then(r => r.json());

    const [version, mastData] = await Promise.all([versionP, masteryP]);

    if (mastData.error) { showError(mastData.error); return; }

    const champRaw  = await getAllChampions(version);
    champMap = buildChampMap(champRaw, version);

    const totalChamps = Object.keys(champMap).length;
    const masteryMap  = {};
    for (const m of mastData.masteries) {
      masteryMap[m.championId] = m;
    }

    // Merge all champions (including unplayed = 0 pts)
    allData = Object.entries(champMap).map(([idStr, c]) => {
      const id = parseInt(idStr);
      const m  = masteryMap[id];
      return {
        id,
        name:   c.name,
        img:    c.img,
        points: m ? m.championPoints : 0,
        level:  m ? m.championLevel  : 0,
      };
    });

    maxPts = Math.max(...allData.map(d => d.points), 1);

    hideStatus();
    document.getElementById('filters').style.display = 'block';
    updateStats();
    renderGrid();

  } catch(e) {
    showError("Erreur réseau ou serveur. Vérifiez votre connexion.");
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

// ── Render ───────────────────────────────────────────────────────────────────
function getFiltered() {
  let data = [...allData];
  if (currentFilter === 'played')   data = data.filter(d => d.points > 0);
  if (currentFilter === 'unplayed') data = data.filter(d => d.points === 0);
  if (currentFilter === 'low')      data = data.filter(d => d.points < 5000);
  return data;
}

function getSorted(data) {
  const s = currentSort;
  return data.sort((a, b) => {
    if (s === 'pts-desc')   return b.points - a.points;
    if (s === 'pts-asc')    return a.points - b.points;
    if (s === 'name-asc')   return a.name.localeCompare(b.name);
    if (s === 'name-desc')  return b.name.localeCompare(a.name);
    if (s === 'level-desc') return b.level - a.level || b.points - a.points;
    return 0;
  });
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const data = getSorted(getFiltered());

  if (data.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text-dim);">Aucun champion dans cette sélection.</div>';
    return;
  }

  data.forEach((d, i) => {
    const card  = document.createElement('div');
    card.className = 'champ-card';
    if (d.points === 0) card.classList.add('unplayed');
    else if (d.points < 5000) card.classList.add('low-pts');
    card.style.animationDelay = `${Math.min(i * 12, 400)}ms`;

    const pct = Math.min((d.points / maxPts) * 100, 100);
    const lvl = d.level;

    card.innerHTML = `
      <img class="champ-img" src="${d.img}" alt="${d.name}" loading="lazy" />
      ${lvl > 0 ? `<div class="badge" data-level="${Math.min(lvl,10)}">${lvl}</div>` : ''}
      <div class="champ-overlay">
        <div class="champ-name">${d.name}</div>
        <div class="champ-pts">${d.points > 0 ? formatPts(d.points) : '—'}</div>
      </div>
      <div class="pts-bar-wrap"><div class="pts-bar" style="width:${pct}%"></div></div>
    `;

    grid.appendChild(card);
  });
}

function formatPts(n) {
  if (n >= 1_000_000) return (n/1_000_000).toFixed(2) + 'M';
  if (n >= 1_000)     return (n/1_000).toFixed(1) + 'k';
  return n.toString();
}

function updateStats() {
  const filtered = getFiltered();
  const played   = filtered.filter(d => d.points > 0).length;
  const total    = allData.length;
  const totalPlayed = allData.filter(d => d.points > 0).length;
  document.getElementById('stats-text').innerHTML =
    `<strong>${filtered.length}</strong> champions affichés — <strong>${totalPlayed}</strong>/<strong>${total}</strong> joués`;
}

// ── Controls ─────────────────────────────────────────────────────────────────
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  updateStats();
  renderGrid();
}

function applySort() {
  currentSort = document.getElementById('sort-select').value;
  renderGrid();
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function showLoading() {
  const s = document.getElementById('status');
  s.style.display = 'block';
  s.innerHTML = '<div class="spinner"></div>Chargement des masteries…';
}

function hideStatus() {
  document.getElementById('status').style.display = 'none';
}

function clearGrid() {
  document.getElementById('grid').innerHTML = '';
  document.getElementById('filters').style.display = 'none';
}

function showError(msg) {
  hideStatus();
  const el = document.getElementById('error-msg');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

// Enter key support
document.getElementById('inp-gamename').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// Initial status
document.getElementById('status').style.display = 'block';
</script>
</body>
</html>
